spring:
  application:
    name: noticebot
  main:
    web-application-type: none
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/noticebot}
    username: ${SPRING_DATASOURCE_USERNAME:notice}
    password: ${SPRING_DATASOURCE_PASSWORD:notice123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_MAXIMUM_POOL_SIZE:4}
      minimum-idle: ${SPRING_DATASOURCE_MINIMUM_IDLE:1}
      idle-timeout: 600000
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

discord:
  token: ${DISCORD_BOT_TOKEN}

gemini:
  api:
    key: ${GEMINI_API_KEY}
  model:
    primary: ${GEMINI_MODEL_PRIMARY:gemini-2.5-flash}
    fallback: ${GEMINI_MODEL_FALLBACK:gemini-1.5-flash}

notice:
  crawler:
    check-interval-ms: ${NOTICE_CRAWLER_CHECK_INTERVAL_MS:12000}
    initial-delay-ms: ${NOTICE_CRAWLER_INITIAL_DELAY_MS:5000}
    request-timeout-ms: ${NOTICE_CRAWLER_REQUEST_TIMEOUT_MS:7000}
