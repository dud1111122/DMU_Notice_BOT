spring:
  application:
    name: noticebot
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/noticebot}
    username: ${SPRING_DATASOURCE_USERNAME:notice}
    password: ${SPRING_DATASOURCE_PASSWORD:notice123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

discord:
  token: ${DISCORD_BOT_TOKEN}

gemini:
  api:
    key: ${GEMINI_API_KEY}
  model:
    primary: ${GEMINI_MODEL_PRIMARY:gemini-2.5-flash}
    fallback: ${GEMINI_MODEL_FALLBACK:gemini-1.5-flash}
