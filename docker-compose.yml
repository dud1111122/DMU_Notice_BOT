version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: notice-postgres
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: joowest911/noticebot:latest
    container_name: notice-app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: "-XX:InitialRAMPercentage=15.0 -XX:MaxRAMPercentage=50.0 -XX:+UseStringDeduplication -XX:+ExitOnOutOfMemoryError"
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}

volumes:
  postgres-data:
